<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Camera Control — Splat Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            overflow: hidden;
            font-family: monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #viewer-container {
            position: relative;
            flex: 1;
            min-height: 0;
        }
        #viewer-container canvas {
            width: 100% !important;
            height: 100% !important;
        }
        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 13px;
            text-align: center;
            padding: 20px;
            pointer-events: none;
        }
        #drop-zone {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(80, 140, 255, 0.15);
            border: 2px dashed #5588ff;
            color: #88aaff;
            font-size: 16px;
            pointer-events: none;
            z-index: 10;
        }
        #drop-zone.active { display: flex; }
        #camera-hud {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            color: #aaa;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 3px;
            pointer-events: none;
            line-height: 1.6;
        }
        #status {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            color: #aaa;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 3px;
            display: none;
        }
        #controls-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #252525;
            border-top: 1px solid #333;
            padding: 5px 10px;
            flex-shrink: 0;
            font-size: 11px;
            color: #aaa;
            flex-wrap: wrap;
        }
        #controls-bar button {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #ccc;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }
        #controls-bar button:hover { background: #4a4a4a; }
        .ctrl-group { display: flex; align-items: center; gap: 5px; }
        .ctrl-group label { color: #777; font-size: 10px; }
    </style>
</head>
<body>

<div id="viewer-container">
    <div id="overlay">Drag a .ply / .splat / .spz file here, or load via the node</div>
    <div id="drop-zone">Drop to load</div>
    <div id="camera-hud">
        Az <span id="hud-az">0.0</span>°&nbsp;
        El <span id="hud-el">0.0</span>°&nbsp;
        Dist <span id="hud-dist">5.0</span>
    </div>
    <div id="status"></div>
</div>

<div id="controls-bar">
    <div class="ctrl-group">
        <button id="btn-reset">Reset View</button>
        <button id="btn-screenshot">Screenshot</button>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
        "@mkkellogg/gaussian-splats-3d": "./js/gaussian-splats-3d.module.js"
    }
}
</script>

<script type="module">
import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

console.log('[SplatViewer] GaussianSplats3D loaded:', !!GaussianSplats3D);

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const container = document.getElementById('viewer-container');
const overlay   = document.getElementById('overlay');
const statusEl  = document.getElementById('status');
const hudAz     = document.getElementById('hud-az');
const hudEl     = document.getElementById('hud-el');
const hudDist   = document.getElementById('hud-dist');

// ─── Viewer state ─────────────────────────────────────────────────────────────
let viewer = null;
let cameraLocked = false;
let lastEmittedAz = null, lastEmittedEl = null, lastEmittedDist = null;
let notifyTimer = null;
let hudTimer = null;

// ─── Status helper ────────────────────────────────────────────────────────────
function showStatus(msg, autoHide = false) {
    statusEl.textContent = msg;
    statusEl.style.display = 'block';
    if (autoHide) setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
}

// ─── Camera spherical helpers ─────────────────────────────────────────────────
function getCameraSpherical() {
    if (!viewer) return { azimuth: 0, elevation: 0, distance: 5 };
    const cam = viewer.camera;
    const controls = viewer.controls;
    if (!cam || !controls) return { azimuth: 0, elevation: 0, distance: 5 };

    const target = controls.target;
    const dx = cam.position.x - target.x;
    const dy = cam.position.y - target.y;
    const dz = cam.position.z - target.z;
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
    const el = Math.asin(Math.max(-1, Math.min(1, dy / dist))) * 180 / Math.PI;
    const az = ((Math.atan2(dx, dz) * 180 / Math.PI) + 360) % 360;
    return { azimuth: az, elevation: el, distance: dist };
}

function applyCameraPose(az, el, dist) {
    if (!viewer) return;
    const cam = viewer.camera;
    const controls = viewer.controls;
    if (!cam || !controls) return;
    const azR = az * Math.PI / 180;
    const elR = el * Math.PI / 180;
    cam.position.set(
        dist * Math.cos(elR) * Math.sin(azR),
        dist * Math.sin(elR),
        dist * Math.cos(elR) * Math.cos(azR)
    );
    controls.target.set(0, 0, 0);
    controls.update();
    updateHUD();
}

function updateHUD() {
    const s = getCameraSpherical();
    hudAz.textContent   = s.azimuth.toFixed(1);
    hudEl.textContent   = s.elevation.toFixed(1);
    hudDist.textContent = s.distance.toFixed(3);
}

function startHUDLoop() {
    if (hudTimer) return;
    hudTimer = setInterval(() => {
        updateHUD();
        if (cameraLocked) return;
        const s = getCameraSpherical();
        if (s.azimuth === lastEmittedAz && s.elevation === lastEmittedEl && s.distance === lastEmittedDist) return;
        lastEmittedAz = s.azimuth; lastEmittedEl = s.elevation; lastEmittedDist = s.distance;
        clearTimeout(notifyTimer);
        notifyTimer = setTimeout(() => {
            window.parent.postMessage({ type: 'CAMERA_CHANGED', ...s }, '*');
        }, 80);
    }, 100);
}

// ─── Init viewer ──────────────────────────────────────────────────────────────
function initViewer() {
    if (viewer) {
        viewer.dispose();
        viewer = null;
    }

    viewer = new GaussianSplats3D.Viewer({
        rootElement: container,
        selfDrivenMode: true,
        useBuiltInControls: true,
        ignoreDevicePixelRatio: false,
        gpuAcceleratedSort: true,
        enableSplatIndicesAttribute: false,
        camera: undefined,
        webXRMode: GaussianSplats3D.WebXRMode.None,
    });

    startHUDLoop();
}

// ─── Load splat ───────────────────────────────────────────────────────────────
async function loadFromUrl(url, filename) {
    console.log('[SplatViewer] loadFromUrl:', url, 'filename:', filename);
    showStatus(`Loading ${filename}…`);
    overlay.style.display = 'none';

    // Reinitialise viewer for each new file (cleanest way to clear previous splat)
    initViewer();

    try {
        await viewer.addSplatScene(url, {
            splatAlphaRemovalThreshold: 5,
            showLoadingUI: false,
            position: [0, 0, 0],
            rotation: [0, 0, 0, 1],
            scale: [1, 1, 1],
        });

        viewer.start();

        // Default orbit pose
        applyCameraPose(45, 20, 3);
        showStatus(`Loaded: ${filename}`, true);
        window.parent.postMessage({ type: 'MODEL_LOADED', radius: 1 }, '*');
    } catch (err) {
        console.error('[SplatViewer] Load error:', err);
        overlay.textContent = `Error: ${err.message}`;
        overlay.style.display = 'flex';
        statusEl.style.display = 'none';
        window.parent.postMessage({ type: 'MODEL_ERROR', error: err.message }, '*');
    }
}

// ─── Screenshot ───────────────────────────────────────────────────────────────
function takeScreenshot() {
    if (!viewer) return;
    const canvas = viewer.renderer?.domElement;
    if (!canvas) return;
    const dataUrl = canvas.toDataURL('image/png');
    const s = getCameraSpherical();
    window.parent.postMessage({ type: 'SCREENSHOT', image: dataUrl, ...s }, '*');
}

// ─── Drag-and-drop upload ─────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const SUPPORTED = new Set(['ply', 'splat', 'spz', 'ksplat']);

async function uploadAndLoad(file) {
    console.log('[SplatViewer] uploadAndLoad:', file.name);
    const ext = file.name.split('.').pop().toLowerCase();
    if (!SUPPORTED.has(ext)) { showStatus(`Unsupported: .${ext}`, true); return; }

    showStatus(`Uploading ${file.name}…`);
    const fd = new FormData();
    fd.append('image', file, file.name);
    fd.append('type', 'input');
    fd.append('subfolder', '3d');
    fd.append('overwrite', 'true');
    try {
        const res = await fetch('/upload/image', { method: 'POST', body: fd });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        console.log('[SplatViewer] upload ok, name:', data.name);
        window.parent.postMessage({ type: 'FILE_UPLOADED', filename: data.name }, '*');
        const url = `/view?filename=${encodeURIComponent(data.name)}&type=input&subfolder=3d`;
        await loadFromUrl(url, file.name);
    } catch (err) {
        console.error('[SplatViewer] upload error:', err);
        showStatus(`Upload failed: ${err.message}`, true);
    }
}

document.addEventListener('dragenter', e => {
    if (e.dataTransfer?.types.includes('Files')) { dropZone.classList.add('active'); e.preventDefault(); }
});
document.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropZone.classList.remove('active'); });
document.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('active');
    const file = e.dataTransfer?.files?.[0];
    console.log('[SplatViewer] drop:', file?.name);
    if (file) uploadAndLoad(file);
});

// ─── postMessage API ──────────────────────────────────────────────────────────
window.addEventListener('message', event => {
    const msg = event.data;
    if (!msg?.type) return;

    switch (msg.type) {
        case 'LOAD_MODEL': {
            cameraLocked = !!msg.locked;
            const filename = new URL(msg.filepath, location.href).searchParams.get('filename')
                || msg.filepath.split('/').pop();
            loadFromUrl(msg.filepath, filename).then(() => {
                if (msg.camera) applyCameraPose(msg.camera.azimuth, msg.camera.elevation, msg.camera.distance);
            });
            break;
        }
        case 'SET_CAMERA': {
            cameraLocked = !!msg.locked;
            applyCameraPose(msg.azimuth, msg.elevation, msg.distance);
            break;
        }
        case 'TAKE_SCREENSHOT': {
            takeScreenshot();
            break;
        }
    }
});

// ─── Controls bar ─────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => applyCameraPose(45, 20, 3));
document.getElementById('btn-screenshot').addEventListener('click', takeScreenshot);

console.log('[SplatViewer] Ready');
</script>
</body>
</html>
